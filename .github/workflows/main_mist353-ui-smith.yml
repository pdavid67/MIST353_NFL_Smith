# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Streamlit app to Azure Web App - MIST353-ui-smith

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/main_mist353-ui-smith.yml'
      - 'UI/**'
      - 'streamlit_startup.sh'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies into deployment package
        run: |
          mkdir -p .python_packages/lib/site-packages
          python -m pip install --target .python_packages/lib/site-packages -r UI/requirements.txt

      - name: Prepare deployment package
        run: |
          cp UI/requirements.txt requirements.txt

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: streamlit-app
          path: |
            UI/
            .python_packages/
            requirements.txt
            streamlit_startup.sh
            !UI/__pycache__/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: streamlit-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'MIST353-ui-smith'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_UI }}
          package: .
