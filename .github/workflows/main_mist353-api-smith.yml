# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - MIST353-api-smith

on:
  push:
    branches:
      - main
    paths:
        - '.github/workflows/main_mist353-api-smith.yml'
        - 'API/**'
        - 'requirements.txt'
        - 'app.py'
        - 'startup.sh'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 🛠️ Local Build Section (Optional)
      # The following section in your workflow is designed to catch build issues early on the client side, before deployment. This can be helpful for debugging and validation. However, if this step significantly increases deployment time and early detection is not critical for your workflow, you may remove this section to streamline the deployment process.
      - name: Install dependencies into deployment package
        run: |
          mkdir -p api_packages/py312/lib/site-packages
          python -m pip install --target api_packages/py312/lib/site-packages -r API/requirements.txt
                
      # By default, when you enable GitHub CI/CD integration through the Azure portal, the platform automatically sets the SCM_DO_BUILD_DURING_DEPLOYMENT application setting to true. This triggers the use of Oryx, a build engine that handles application compilation and dependency installation (e.g., pip install) directly on the platform during deployment. Hence, we exclude the antenv virtual environment directory from the deployment artifact to reduce the payload size. 
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            API/
            api_packages/
            app.py
            requirements.txt
            startup.sh
            !API/.env
            !API/__pycache__/

      # 🚫 Opting Out of Oryx Build
      # If you prefer to disable the Oryx build process during deployment, follow these steps:
      # 1. Remove the SCM_DO_BUILD_DURING_DEPLOYMENT app setting from your Azure App Service Environment variables.
      # 2. Refer to sample workflows for alternative deployment strategies: https://github.com/Azure/actions-workflow-samples/tree/master/AppService
      

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Remove stale Oryx files from Azure
        env:
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import urllib.request
          import xml.etree.ElementTree as ET

          publish_profile = os.environ["AZURE_WEBAPP_PUBLISH_PROFILE"]
          profiles = ET.fromstring(publish_profile).findall("publishProfile")
          profile = next(
              (p for p in profiles if p.attrib.get("publishMethod") == "MSDeploy"),
              profiles[0],
          )

          publish_host = profile.attrib["publishUrl"].split(":")[0]
          username = profile.attrib["userName"]
          password = profile.attrib["userPWD"]
          credentials = base64.b64encode(f"{username}:{password}".encode()).decode()

          cleanup_command = (
              "rm -f /home/site/wwwroot/oryx-manifest.toml "
              "/home/site/wwwroot/output.tar.gz; "
              "rm -rf /home/site/wwwroot/antenv "
              "/home/site/wwwroot/__oryx_packages__ "
              "/home/site/wwwroot/api_packages"
          )

          request = urllib.request.Request(
              f"https://{publish_host}/api/command",
              data=json.dumps({"command": cleanup_command, "dir": "/home"}).encode(),
              headers={
                  "Authorization": f"Basic {credentials}",
                  "Content-Type": "application/json",
              },
          )

          with urllib.request.urlopen(request, timeout=90) as response:
              print(response.read().decode())
          PY

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'MIST353-api-smith'
          slot-name: 'Production'
          # publish-profile auth cannot set startup-command for Linux apps,
          # so app.py exposes a WSGI wrapper around the FastAPI app.
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
          
