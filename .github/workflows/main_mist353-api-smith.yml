# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - MIST353-api-smith

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/main_mist353-api-smith.yml'
      - 'API/**'
      - 'requirements.txt'
      - 'app.py'
      - 'startup.sh'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies into deployment package
        run: |
          mkdir -p api_packages/py312/lib/site-packages
          python -m pip install --target api_packages/py312/lib/site-packages -r API/requirements.txt

      - name: Prepare deployment package
        run: |
          mkdir -p deploy/API deploy/api_packages
          cp -R API/. deploy/API/
          cp -R api_packages/. deploy/api_packages/
          cp app.py requirements.txt startup.sh deploy/
          chmod +x deploy/startup.sh
          test -f deploy/startup.sh
          test -f deploy/app.py
          test -f deploy/API/requirements.txt
          cd deploy
          zip -r ../python-app.zip .

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: python-app.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Verify deployment package
        run: |
          unzip -l python-app.zip | grep -E '(^|[[:space:]])startup\.sh$'
          unzip -l python-app.zip | grep -E '(^|[[:space:]])app\.py$'
          unzip -l python-app.zip | grep -E '(^|[[:space:]])API/requirements\.txt$'

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'MIST353-api-smith'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: python-app.zip
          clean: true
